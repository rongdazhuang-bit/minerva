services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: minerva
      POSTGRES_PASSWORD: minerva
      POSTGRES_DB: minerva
    ports:
      - "5432:5432"
    volumes:
      - minerva_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  minerva_pg: {}
