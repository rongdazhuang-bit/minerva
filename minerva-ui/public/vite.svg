<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Minerva" shape-rendering="geometricPrecision">
  <title>Minerva</title>
  <defs>
    <linearGradient id="mva" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="mvb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a3d"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
  </defs>
  <!-- 轻微圆底：在浏览器标签/浅色背景下轮廓更清晰 -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#mvb)"/>
  <!-- 规则库：单层叠放示意，避免 16px 下糊成一片 -->
  <rect x="4" y="6" width="16" height="20" rx="1.2" fill="none" stroke="url(#mva)" stroke-width="0.85" opacity="0.4"/>
  <!-- 主文档 + 折角 -->
  <path
    d="M8 4.5h9.2L19 6.2v19.1a1.1 1.1 0 0 1-1.1 1.1H8.1A1.1 1.1 0 0 1 7 25.3V5.6A1.1 1.1 0 0 1 8 4.5z"
    fill="url(#mvb)"
    stroke="url(#mva)"
    stroke-width="1.1"
    stroke-linejoin="round"
  />
  <line x1="8.8" y1="11" x2="16.2" y2="11" stroke="url(#mva)" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
  <line x1="8.8" y1="15" x2="15" y2="15" stroke="url(#mva)" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- 校审：放大镜略放大，与边缘留白 -->
  <circle cx="20.4" cy="20.2" r="4.2" fill="none" stroke="url(#mva)" stroke-width="1.3"/>
  <line x1="23.1" y1="23" x2="27.2" y2="27" stroke="url(#mva)" stroke-width="1.4" stroke-linecap="round"/>
</svg>
